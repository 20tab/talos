http:
  routers:
{%- if cookiecutter.backend_type != "none" %}
    {{ cookiecutter.backend_service_slug }}:
      rule: Host(`{{ '{{' }}env "BACKEND_DOMAIN"{{ '}}' }}`)
      service: {{ cookiecutter.backend_service_slug }}
{%- endif %}
{%- if cookiecutter.frontend_type != "none" %}
    {{ cookiecutter.frontend_service_slug }}:
      rule: Host(`{{ '{{' }}env "FRONTEND_DOMAIN"{{ '}}' }}`)
      service: {{ cookiecutter.frontend_service_slug }}
{%- endif %}
    mailbox:
      rule: Host(`{{ '{{' }}env "MAIL_DOMAIN"{{ '}}' }}`)
      service: mail
  services:
{%- if cookiecutter.backend_type != "none" %}
    {{ cookiecutter.backend_service_slug }}:
      loadBalancer:
        servers:
          - url: "http://{{ cookiecutter.backend_service_slug }}:{{ cookiecutter.backend_service_port }}/"
{%- endif %}
{%- if cookiecutter.frontend_type != "none" %}
    {{ cookiecutter.frontend_service_slug }}:
      loadBalancer:
        servers:
          - url: "http://{{ cookiecutter.frontend_service_slug }}:{{ cookiecutter.frontend_service_port }}/"
{%- endif %}
    mail:
      loadBalancer:
        servers:
          - url: "http://mail:8025/"

tls:
  certificates:
    - certFile: /traefik/tls/cert.pem
      keyFile: /traefik/tls/key.pem
